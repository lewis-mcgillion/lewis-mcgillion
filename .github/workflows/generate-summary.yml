name: Generate Achievement Summary

on:
  workflow_run:
    workflows: ["Fetch GitHub Activity"]
    types: [completed]
  workflow_dispatch:
    inputs:
      months:
        description: "Comma-separated months to summarize (e.g., 2025-01,2025-02). Leave empty for previous month."
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  create-summary-issue:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine target months
        id: months
        run: |
          if [ -n "${{ inputs.months }}" ]; then
            echo "months=${{ inputs.months }}" >> "$GITHUB_OUTPUT"
          else
            # Default to previous month
            PREV_MONTH=$(date -d 'last month' '+%Y-%m' 2>/dev/null || date -v-1m '+%Y-%m')
            echo "months=$PREV_MONTH" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone career-data to check available months
        env:
          PAT: ${{ secrets.CAREER_DATA_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/${{ github.repository_owner }}/career-data.git /tmp/career-data
          echo "Available data months:"
          ls /tmp/career-data/data/ 2>/dev/null || echo "No data yet"

      - name: Create Copilot agent issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CAREER_PAT: ${{ secrets.CAREER_DATA_PAT }}
        run: |
          TARGET_MONTHS="${{ steps.months.outputs.months }}"
          OWNER="${{ github.repository_owner }}"

          ISSUE_BODY=$(cat <<'ISSUE_EOF'
          ## Task: Generate Achievement Summary

          Generate achievement summaries for the following months: **TARGET_MONTHS_PLACEHOLDER**

          ### Instructions

          1. **Clone the private data repo:**
             ```bash
             git clone https://x-access-token:${CAREER_PAT}@github.com/OWNER_PLACEHOLDER/career-data.git /tmp/career-data
             ```

          2. **For each target month**, read the JSON files from `/tmp/career-data/data/YYYY-MM/`:
             - `issues-created.json` — Issues I opened
             - `issues-assigned.json` — Issues assigned to me
             - `prs-created.json` — PRs I authored
             - `prs-assigned.json` — PRs assigned to me
             - `pr-reviews.json` — PR reviews I performed
             - `issue-comments.json` — My issue comments
             - `pr-comments.json` — My PR review comments

          3. **Generate/update a monthly achievement file** at `achievements/YYYY-MM.md`:
             - Use the template at `achievements/TEMPLATE.md` for structure
             - Follow ALL sanitization rules in `.github/copilot-instructions.md`
             - Focus on impact, themes, and accomplishments — NOT raw activity
             - Be specific about technical contributions while keeping repo names generic

          4. **Update `achievements/SUMMARY.md`**:
             - Add/update the entry for each processed month
             - Keep entries in chronological order
             - Each month should have a 2-3 sentence highlight linking to the monthly file

          5. **Commit and push** all changes to this repository.

          ### Important Reminders
          - Read `.github/copilot-instructions.md` for detailed sanitization rules
          - NEVER include internal repo names, issue numbers, or direct links
          - Use performance-review-friendly language
          - Quantify contributions where possible
          ISSUE_EOF
          )

          # Replace placeholders
          ISSUE_BODY="${ISSUE_BODY//TARGET_MONTHS_PLACEHOLDER/$TARGET_MONTHS}"
          ISSUE_BODY="${ISSUE_BODY//OWNER_PLACEHOLDER/$OWNER}"

          gh issue create \
            --title "Generate achievement summary for ${TARGET_MONTHS}" \
            --body "$ISSUE_BODY" \
            --label "copilot"
