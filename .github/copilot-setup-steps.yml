steps:
  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "22"

  - name: Install dependencies
    run: npm ci

  - name: Configure git
    run: |
      git config --global user.name "copilot[bot]"
      git config --global user.email "copilot[bot]@users.noreply.github.com"
